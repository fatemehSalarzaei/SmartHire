services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smarthire
      POSTGRES_USER: smarthire
      POSTGRES_PASSWORD: change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  celery_worker:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - backend
      - redis
      - postgres
    command: celery -A app.workers.celery_app worker --loglevel=INFO -Q sync,ai_analysis,screening,ranking,default

  celery_beat:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - backend
      - redis
      - postgres
    command: celery -A app.workers.celery_app beat --loglevel=INFO

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
